pre-commit:
  commands:
    format:
      run: npx prettier --write {staged_files}
      glob: '*.{js,jsx,ts,tsx,css,json,md}'
      stage_fixed: true
    lint:
      run: npx eslint {staged_files} --fix
      glob: '*.{ts,tsx}'
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: npm run check-types
      glob: '*.{ts,tsx}'